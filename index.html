<!DOCTYPE html>
<html>
<head>
<title>Nature World</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* Navbar */
.navbar {
    background-color: #2e8b57;
    padding: 15px;
    text-align: center;
}
.navbar a {
    color: white;
    margin: 15px;
    text-decoration: none;
    font-size: 18px;
}

/* Hero Section */
.hero {
    background-image: url("https://images.unsplash.com/photo-1501785888041-af3ef285b470");
    background-size: cover;
    color: white;
    padding: 100px;
    text-align: center;
}
.hero h1 {
    font-size: 45px;
}
.hero p {
    font-size: 20px;
}

/* About Section */
.about {
    padding: 30px;
    text-align: center;
}

/* Gallery */
.gallery {
    text-align: center;
    padding: 20px;
}
.gallery img {
    width: 250px;
    margin: 10px;
    border-radius: 10px;
}

/* Footer */
.footer {
    background-color: #2e8b57;
    color: white;
    text-align: center;
    padding: 10px;
}
</style>

</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Gallery</a>
</div>

<!-- Hero -->
<div class="hero">
    <h1>Welcome to Nature World 🌿</h1>
    <p>Feel the beauty of nature</p>
</div>

<!-- About -->
<div class="about">
    <h2>About Nature</h2>
    <p>Nature gives us peace, fresh air, and beauty. Trees, rivers, mountains and animals make our world amazing.</p>
</div>

<!-- Gallery -->
<div class="gallery">
    <h2>Nature Gallery</h2>

    <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
    <img src="https://images.unsplash.com/photo-1493244040629-496f6d136cc3">
    <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">

</div>

<!-- Footer -->
<div class="footer">
    <p>Made by Madeeha 🌸</p>
</div>

</body>
</html>
