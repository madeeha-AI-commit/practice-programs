<!DOCTYPE html>
<html>
<head>
<title>Nature World</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* Navbar */
.navbar {
    background-color: #1b5e20;
    padding: 15px;
    text-align: center;
}
.navbar a {
    color: white;
    margin: 20px;
    text-decoration: none;
    font-size: 18px;
    font-weight: bold;
}
.navbar a:hover {
    color: #a5d6a7;
}

/* Hero Section */
.hero {
    background-image: url("https://images.unsplash.com/photo-1501785888041-af3ef285b470");
    background-size: cover;
    background-position: center;
    color: white;
    padding: 120px 20px;
    text-align: center;
}
.hero h1 {
    font-size: 50px;
}
.hero p {
    font-size: 22px;
}

/* Section */
.section {
    padding: 40px;
    text-align: center;
}

/* Cards */
.cards {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
}
.card {
    width: 250px;
    margin: 15px;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0px 0px 10px gray;
}
.card img {
    width: 100%;
}
.card h3 {
    margin: 10px;
}
.card p {
    padding: 0 10px 10px;
}

/* Gallery */
.gallery img {
    width: 250px;
    margin: 10px;
    border-radius: 10px;
}

/* Footer */
.footer {
    background-color: #1b5e20;
    color: white;
    padding: 15px;
    text-align: center;
}
</style>

</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <a href="index.html">Home</a>
    <a href="https://github.com/madeeha-AI-commit/practice-programs/blob/main/services.html"</a>
    <a href="#">Gallery</a>
    <a href="#">Contact</a>
</div>

<!-- Hero -->
<div class="hero">
    <h1>Explore Nature 🌿</h1>
    <p>Discover the beauty of the world around you</p>
</div>





<!-- Footer -->
<div class="footer">
    <p>© 2026 Nature World | Made by Madeeha 🌸</p>
</div>

</body>
            </html>
